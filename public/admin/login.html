<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Login — ADX Panel</title>
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&family=Roboto:wght@400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Roboto', sans-serif;
      background: linear-gradient(135deg, #0d1b6e 0%, #1a237e 40%, #283593 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
      padding: 48px 44px 40px;
      width: 100%;
      max-width: 420px;
      position: relative;
      overflow: hidden;
    }
    .login-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 5px;
      background: linear-gradient(90deg, #1a73e8, #34a853, #fbbc04, #ea4335);
    }

    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo-area .logo-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px; height: 56px;
      border-radius: 14px;
      background: linear-gradient(135deg, #1a237e, #283593);
      margin-bottom: 14px;
    }
    .logo-area .logo-badge svg { width: 28px; height: 28px; fill: #fff; }
    .logo-area h1 {
      font-family: 'Google Sans', sans-serif;
      font-size: 22px;
      font-weight: 700;
      color: #202124;
      margin-bottom: 4px;
    }
    .logo-area p {
      font-size: 13px;
      color: #5f6368;
    }

    .form-group {
      margin-bottom: 18px;
    }
    .form-group label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #5f6368;
      margin-bottom: 7px;
    }
    .input-wrap {
      position: relative;
    }
    .input-wrap input {
      width: 100%;
      padding: 12px 44px 12px 14px;
      border: 1.5px solid #dadce0;
      border-radius: 8px;
      font-size: 14px;
      font-family: 'Roboto', sans-serif;
      color: #202124;
      background: #f8f9fa;
      transition: all 0.2s;
      outline: none;
    }
    .input-wrap input:focus {
      border-color: #1a73e8;
      background: #fff;
      box-shadow: 0 0 0 3px rgba(26,115,232,0.12);
    }
    .input-wrap .toggle-pw {
      position: absolute;
      right: 12px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      cursor: pointer;
      color: #9aa0a6;
      font-size: 18px;
      padding: 0;
      display: flex; align-items: center;
    }
    .input-wrap .toggle-pw:hover { color: #5f6368; }

    .error-msg {
      background: #fce8e6;
      border: 1px solid #f5c6c2;
      color: #c5221f;
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 18px;
      display: none;
      align-items: center;
      gap: 8px;
    }
    .error-msg.show { display: flex; }

    .btn-login {
      width: 100%;
      padding: 13px;
      background: linear-gradient(135deg, #1a73e8 0%, #1557b0 100%);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      font-family: 'Google Sans', sans-serif;
      cursor: pointer;
      transition: all 0.2s;
      letter-spacing: 0.2px;
      margin-top: 4px;
    }
    .btn-login:hover { background: linear-gradient(135deg, #1557b0 0%, #0d47a1 100%); box-shadow: 0 6px 20px rgba(26,115,232,0.35); transform: translateY(-1px); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.65; cursor: not-allowed; transform: none; }

    .footer-note {
      text-align: center;
      margin-top: 24px;
      font-size: 12px;
      color: #9aa0a6;
    }

    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
      display: none;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="logo-area">
      <div class="logo-badge">
        <svg viewBox="0 0 24 24"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
      </div>
      <h1>ADX Admin Panel</h1>
      <p>Sign in to access the admin dashboard</p>
    </div>

    <div class="error-msg" id="errorMsg">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <span id="errorText">Invalid username or password.</span>
    </div>

    <form id="loginForm" onsubmit="handleLogin(event)" autocomplete="off">
      <div class="form-group">
        <label>Username</label>
        <div class="input-wrap">
          <input type="text" id="username" placeholder="Enter username" autocomplete="username" required/>
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" id="password" placeholder="Enter password" autocomplete="current-password" required/>
          <button type="button" class="toggle-pw" onclick="togglePw()" title="Toggle password visibility">
            <svg id="eyeIcon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <button type="submit" class="btn-login" id="loginBtn">
        <span class="spinner" id="spinner"></span>
        Sign In
      </button>
    </form>

    <p class="footer-note">Protected area. Unauthorized access is prohibited.</p>
  </div>

  <script>
    // Check if already logged in
    if (sessionStorage.getItem('adx_admin_auth')) {
      window.location.href = '/admin/';
    }

    function togglePw() {
      const pw = document.getElementById('password');
      const icon = document.getElementById('eyeIcon');
      if (pw.type === 'password') {
        pw.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        pw.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    }

    async function handleLogin(e) {
      e.preventDefault();
      const btn = document.getElementById('loginBtn');
      const spinner = document.getElementById('spinner');
      const errMsg = document.getElementById('errorMsg');
      const errText = document.getElementById('errorText');

      btn.disabled = true;
      spinner.style.display = 'inline-block';
      errMsg.classList.remove('show');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();

        if (data.success) {
          sessionStorage.setItem('adx_admin_auth', '1');
          sessionStorage.setItem('adx_admin_auth_token', data.token);
          sessionStorage.setItem('adx_admin_user', username);
          window.location.href = '/admin/';
        } else {
          errText.textContent = data.message || 'Invalid username or password.';
          errMsg.classList.add('show');
          document.getElementById('password').value = '';
          document.getElementById('password').focus();
        }
      } catch (err) {
        errText.textContent = 'Server error. Please try again.';
        errMsg.classList.add('show');
      } finally {
        btn.disabled = false;
        spinner.style.display = 'none';
      }
    }
  </script>
</body>
</html>
